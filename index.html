<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ember — Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0D0D0D;
      color: #F5F5F5;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .sphere {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin: 0 auto 28px;
      background: radial-gradient(circle at 50% 38%, #4f9e7a 0%, #2D6A4F 45%, #1A3A2A 80%, #0f2419 100%);
      box-shadow: 0 0 60px rgba(45, 106, 79, 0.5), 0 0 120px rgba(45, 106, 79, 0.25);
    }
    h1 {
      font-size: 32px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .tagline {
      text-align: center;
      color: #8a8a8a;
      margin-bottom: 40px;
      font-size: 15px;
    }
    .card {
      background: #1C1C1E;
      border: 1px solid #2a2a2c;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2D6A4F;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .card p { color: #cfcfcf; margin-bottom: 12px; font-size: 15px; }
    .card a { color: #4f9e7a; text-decoration: none; }
    .card a:hover { text-decoration: underline; }
    .email {
      display: inline-block;
      background: #1A3A2A;
      color: #6fc79e !important;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 500;
      margin-top: 4px;
    }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      padding: 14px 16px;
      background: #161618;
      border: 1px solid #2a2a2c;
      border-radius: 10px;
      transition: background 0.2s;
    }
    .links a:hover { background: #1f1f22; text-decoration: none; }
    footer {
      text-align: center;
      color: #5a5a5a;
      font-size: 13px;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="sphere"></div>
    <h1>ember</h1>
    <p class="tagline">your calm space to focus</p>

    <div class="card">
      <h2>Support</h2>
      <p>Need help, have a question, or found a bug? We're here for you. Reach out anytime and we'll get back to you as soon as we can.</p>
      <a class="email" href="mailto:support.ember.app@gmail.com">support.ember.app@gmail.com</a>
    </div>

    <div class="card">
      <h2>Legal</h2>
      <div class="links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms.html">Terms of Use</a>
        <a href="eula.html">EULA</a>
      </div>
    </div>

    <footer>© 2026 Leonardo Bastianon · ember</footer>
  </div>
</body>
</html>
